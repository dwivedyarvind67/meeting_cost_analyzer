databases:
  - name: meeting-cost-analyzer-db
    databaseName: mca_prod
    plan: free
    region: oregon # or frankfurt, ohio, etc. depending on your Render account

services:
  - type: web
    name: meeting-cost-analyzer-api
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && gunicorn main:app --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: meeting-cost-analyzer-db
          property: connectionString
      - key: ENVIRONMENT
        value: dev
      - key: SECRET_KEY
        generateValue: true
      # You must manually set CORS_ORIGINS to your Vercel URL
      # - key: CORS_ORIGINS
      #   value: https://your-vercel-domain.vercel.app
