services:
  - type: web
    name: mca-backend
    env: python
    plan: free
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && gunicorn main:app -w 4 -k uvicorn.workers.UvicornWorker"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mca-postgres
          property: connectionString
      - key: CORS_ORIGINS
        # Update this to your vercel app domain once deployed
        value: "https://your-vercel-app.vercel.app" 
      - key: ENVIRONMENT
        value: "production"
      - key: PYTHON_VERSION
        value: "3.11.0"
      # These must be set manually in the Render Dashboard
      - key: SECRET_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false

databases:
  - name: mca-postgres
    plan: free # Note: Free DBs expire in 90 days. Upgrade if making a permanent SaaS.
